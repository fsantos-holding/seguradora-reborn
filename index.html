<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backlog Reborn — Painel Executivo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #00C9B7;
    --teal-dark: #00A89A;
    --navy: #0A1F3F;
    --navy-light: #132D54;
    --lime: #C5D93E;
    --lime-soft: #D4E45A;
    --white: #FFFFFF;
    --off-white: #F7F8FC;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --red: #EF4444;
    --red-bg: #FEF2F2;
    --red-border: #FECACA;
    --amber: #F59E0B;
    --amber-bg: #FFFBEB;
    --amber-border: #FDE68A;
    --blue: #3B82F6;
    --blue-bg: #EFF6FF;
    --blue-border: #BFDBFE;
    --font-display: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(10,31,63,0.08);
    --shadow-lg: 0 8px 30px rgba(10,31,63,0.12);
    --shadow-card: 0 2px 8px rgba(10,31,63,0.06);
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--off-white);
    color: var(--gray-700);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--navy);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .brand-icon {
    width: 10px;
    height: 28px;
    background: var(--teal);
    border-radius: 2px;
  }
  .brand h1 {
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.02em;
  }
  .brand h1 span {
    color: var(--teal);
    font-weight: 600;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .btn-export {
    background: var(--teal);
    color: var(--navy);
    border: none;
    padding: 0.55rem 1.25rem;
    border-radius: 8px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .btn-export:hover { background: var(--lime); }
  .btn-secondary {
    background: transparent;
    color: var(--gray-400);
    border: 1px solid var(--gray-600);
    padding: 0.55rem 1.25rem;
    border-radius: 8px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { color: var(--white); border-color: var(--gray-400); }

  /* ── Stats Bar ── */
  .stats-bar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 0;
  }
  .stats-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    overflow-x: auto;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    white-space: nowrap;
  }
  .stat-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stat-pill .stat-label {
    font-size: 0.78rem;
    color: var(--gray-500);
    font-weight: 500;
  }
  .stat-pill .stat-count {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1rem;
    color: var(--gray-800);
  }
  .stat-divider {
    width: 1px;
    height: 28px;
    background: var(--gray-200);
    flex-shrink: 0;
  }

  /* ── Filters ── */
  .filters-bar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.25rem 2rem 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    border: 1.5px solid var(--gray-200);
    background: var(--white);
    color: var(--gray-600);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .filter-chip:hover { border-color: var(--teal); color: var(--teal-dark); }
  .filter-chip.active {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }
  .filter-label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 0.25rem;
  }
  .filter-separator {
    width: 1px;
    height: 24px;
    background: var(--gray-200);
    margin: 0 0.5rem;
  }

  /* ── Board ── */
  .board {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.25rem 2rem 3rem;
  }

  /* ── Bucket Section ── */
  .bucket-section {
    margin-bottom: 2rem;
    animation: fadeUp 0.4s ease both;
  }
  .bucket-section:nth-child(2) { animation-delay: 0.06s; }
  .bucket-section:nth-child(3) { animation-delay: 0.12s; }
  .bucket-section:nth-child(4) { animation-delay: 0.18s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bucket-header {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    margin-bottom: 0.85rem;
  }
  .bucket-indicator {
    width: 4px;
    height: 22px;
    border-radius: 2px;
  }
  .bucket-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1rem;
    color: var(--gray-800);
    letter-spacing: -0.01em;
  }
  .bucket-count {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--white);
    padding: 0.15rem 0.55rem;
    border-radius: 10px;
    margin-left: 0.25rem;
  }

  /* ── Cards Grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 0.85rem;
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    padding: 1.1rem 1.25rem;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    border-radius: 10px 0 0 10px;
  }
  .card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--gray-300);
    transform: translateY(-1px);
  }
  .card.priority-urgente::before { background: var(--red); }
  .card.priority-importante::before { background: var(--amber); }
  .card.priority-media::before { background: var(--blue); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
  }
  .card-id {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--gray-400);
    letter-spacing: 0.03em;
    font-family: 'SF Mono', 'Fira Code', monospace;
    flex-shrink: 0;
  }
  .priority-badge {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.18rem 0.55rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .priority-badge.urgente { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .priority-badge.importante { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .priority-badge.media { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

  .card-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--gray-800);
    line-height: 1.35;
    margin-bottom: 0.45rem;
    letter-spacing: -0.01em;
  }
  .card-desc {
    font-size: 0.8rem;
    color: var(--gray-500);
    line-height: 1.55;
    margin-bottom: 0.85rem;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 0.9rem;
  }
  .tag {
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--gray-500);
    background: var(--gray-100);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
  }

  /* ── Direction Selector ── */
  .direction-area {
    border-top: 1px solid var(--gray-100);
    padding-top: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .direction-label {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 0.2rem;
  }
  .direction-btn {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    border: 1.5px solid var(--gray-200);
    background: var(--white);
    color: var(--gray-500);
    cursor: pointer;
    transition: all 0.2s;
  }
  .direction-btn:hover {
    border-color: var(--teal);
    color: var(--teal-dark);
    background: #F0FDFB;
  }
  .direction-btn.selected {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }
  .direction-btn.selected.dir-manter { background: #059669; border-color: #059669; }
  .direction-btn.selected.dir-priorizar { background: var(--teal-dark); border-color: var(--teal-dark); }
  .direction-btn.selected.dir-adiar { background: var(--amber); border-color: var(--amber); color: var(--gray-800); }
  .direction-btn.selected.dir-cancelar { background: var(--red); border-color: var(--red); }
  .direction-btn.selected.dir-reavaliar { background: var(--gray-600); border-color: var(--gray-600); }

  /* ── Summary Panel ── */
  .summary-panel {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    box-shadow: var(--shadow-sm);
  }
  .summary-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--gray-800);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 1rem;
  }
  .summary-grid {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .summary-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    background: var(--gray-50);
    border-radius: 8px;
    min-width: 130px;
  }
  .summary-item .s-count {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.3rem;
    color: var(--gray-800);
  }
  .summary-item .s-label {
    font-size: 0.75rem;
    color: var(--gray-500);
    font-weight: 500;
  }
  .summary-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Hidden bucket ── */
  .bucket-section.hidden { display: none; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header-inner, .stats-inner, .filters-bar, .board { padding-left: 1rem; padding-right: 1rem; }
    .cards-grid { grid-template-columns: 1fr; }
    .stats-inner { gap: 1rem; }
    .summary-grid { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon"></div>
      <h1>AUSTRAL <span>SEGURADORA</span> — Backlog Reborn</h1>
    </div>
    <div class="header-actions">
      <button class="btn-secondary" onclick="resetAll()">Limpar Seleções</button>
      <button class="btn-export" onclick="exportSummary()">Exportar Resumo</button>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat-pill">
      <div class="stat-dot" style="background:var(--teal)"></div>
      <span class="stat-label">Em Execução</span>
      <span class="stat-count" id="count-exec">3</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-pill">
      <div class="stat-dot" style="background:var(--navy)"></div>
      <span class="stat-label">Priorizado</span>
      <span class="stat-count" id="count-prio">8</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-pill">
      <div class="stat-dot" style="background:#2D6A4F"></div>
      <span class="stat-label">Backlog</span>
      <span class="stat-count" id="count-back">4</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-pill">
      <div class="stat-dot" style="background:var(--gray-400)"></div>
      <span class="stat-label">Refinamento</span>
      <span class="stat-count" id="count-ref">6</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-pill">
      <span class="stat-label" style="font-weight:700;color:var(--gray-700)">Total</span>
      <span class="stat-count" style="color:var(--teal-dark)">21</span>
    </div>
  </div>
</div>

<div class="filters-bar">
  <span class="filter-label">Filtrar por:</span>
  <span class="filter-chip active" data-filter="all" onclick="toggleFilter(this)">Todos</span>
  <span class="filter-chip" data-filter="bucket-exec" onclick="toggleFilter(this)">Em Execução</span>
  <span class="filter-chip" data-filter="bucket-prio" onclick="toggleFilter(this)">Priorizado</span>
  <span class="filter-chip" data-filter="bucket-back" onclick="toggleFilter(this)">Backlog</span>
  <span class="filter-chip" data-filter="bucket-ref" onclick="toggleFilter(this)">Refinamento</span>
  <div class="filter-separator"></div>
  <span class="filter-label">Prioridade:</span>
  <span class="filter-chip" data-prio="urgente" onclick="togglePrio(this)">Urgente</span>
  <span class="filter-chip" data-prio="importante" onclick="togglePrio(this)">Importante</span>
  <span class="filter-chip" data-prio="media" onclick="togglePrio(this)">Média</span>
</div>

<div class="board" id="board">

  <!-- Summary -->
  <div class="summary-panel" id="summary-panel">
    <div class="summary-title">Direcionamento Selecionado</div>
    <div class="summary-grid" id="summary-grid">
      <div class="summary-item"><div class="summary-dot" style="background:#059669"></div><span class="s-count" id="sum-manter">0</span><span class="s-label">Manter</span></div>
      <div class="summary-item"><div class="summary-dot" style="background:var(--teal-dark)"></div><span class="s-count" id="sum-priorizar">0</span><span class="s-label">Priorizar</span></div>
      <div class="summary-item"><div class="summary-dot" style="background:var(--amber)"></div><span class="s-count" id="sum-adiar">0</span><span class="s-label">Adiar</span></div>
      <div class="summary-item"><div class="summary-dot" style="background:var(--red)"></div><span class="s-count" id="sum-cancelar">0</span><span class="s-label">Cancelar</span></div>
      <div class="summary-item"><div class="summary-dot" style="background:var(--gray-600)"></div><span class="s-count" id="sum-reavaliar">0</span><span class="s-label">Reavaliar</span></div>
      <div class="summary-item" style="background:var(--navy);"><span class="s-count" style="color:var(--teal);" id="sum-pending">21</span><span class="s-label" style="color:var(--gray-300);">Pendentes</span></div>
    </div>
  </div>

</div>

<script>
const CARDS_DATA = [
  // ── Em Execução ──
  {
    id: "DI-625", bucket: "exec", priority: "media",
    title: "Análise de Crédito Serasa para Segurados D&O",
    desc: "Incorporar a consulta automatizada de crédito via Serasa no fluxo de cadastro de segurados de D&O, reduzindo o risco de inadimplência e fortalecendo a governança na aceitação.",

  },
  {
    id: "DI-629", bucket: "exec", priority: "media",
    title: "Controle de Frequência de Consulta Serasa",

  },
  {
    id: "DI-630", bucket: "exec", priority: "media",
    title: "Novo Formulário de Cadastro para RCG",
    desc: "Criar formulário específico para o produto Responsabilidade Civil Geral (RCG), permitindo captura de dados adequados ao perfil de risco desse segmento.",
    tags: ["Negócio"]

  // ── Priorizado ──
  {
    id: "DI-589", bucket: "prio", priority: "urgente",
    title: "Integração dos Canais de Comunicação com Corretores",
    desc: "Conectar os meios de comunicação (e-mail, telefone) com os dados de contato dos corretores, eliminando lacunas de informação e melhorando o relacionamento comercial. Aguardando liberação de API pelo I4PRO.",
    tags: ["Comercial", "Integração"]
  },
  {
    id: "DI-532", bucket: "prio", priority: "urgente",
    title: "Cadastro Simplificado de Contatos Vinculados a Corretores",
    desc: "Permitir o registro rápido de pessoas (físicas ou jurídicas) como contatos associados a corretoras, agilizando a gestão de relacionamento e a operação comercial.",
    tags: ["Negócio", "Comercial"]
  },
  {
    id: "DI-574", bucket: "prio", priority: "urgente",
    title: "Bloqueio de Cadastro para Registros Inativos",
    desc: "Impedir que registros com status diferente de \"Ativo\" sejam incluídos em novos cadastros, evitando inconsistências operacionais e retrabalho.",
    tags: ["Qualidade de Dados"]

  {
    id: "DI-583", bucket: "prio", priority: "importante",

  },
  {
    id: "DI-587", bucket: "prio", priority: "importante",

  {

  {

    tags: ["Integração", "Dados"]
  },
  {
    id: "DI-576", bucket: "prio", priority: "media",
    title: "Vinculação Automática de Corretores e Contatos ao Tomador",
    desc: "Criar lógica de negócio para associar automaticamente corretores e seus contatos aos respectivos tomadores, reduzindo etapas manuais e erros de vínculo.",

  },

  // ── Backlog ──
  {
    id: "DI-443", bucket: "back", priority: "importante",
    title: "Rotina Anual de Atualização de Dados com a Receita Federal",
    desc: "Implementar processo automatizado de sincronização anual dos dados cadastrais de pessoas com a Receita Federal, assegurando conformidade regulatória e atualidade das informações.",
    tags: ["Regulatório", "Compliance"]
  },
  {
    id: "DI-584", bucket: "back", priority: "importante",
    title: "Melhoria na Comunicação de Boas-Vindas ao Corretor",
    desc: "Aprimorar os e-mails de pré-cadastro e contato inicial enviados aos corretores, tornando a comunicação mais profissional e fortalecendo o primeiro contato comercial.",
    tags: ["Comercial", "Comunicação"]
  },
  {
    id: "DI-590", bucket: "back", priority: "importante",
    title: "Cadastro de Pessoas do Tipo Ressegurador",
    desc: "Criar interface dedicada ao cadastro de resseguradores no sistema, permitindo a gestão adequada desse tipo de parceiro estratégico no ecossistema de seguros.",

  },
  {
    id: "DI-595", bucket: "back", priority: "media",
    title: "Sincronização da Base de Tomadores entre I4PRO e Reborn",

    tags: ["Integração", "Dados"]
  },

  // ── Refinamento ──
  {
    id: "DI-592", bucket: "ref", priority: "importante",
    title: "Painel de Gestão de Controle de Acesso (RBAC)",
    desc: "Construir interface administrativa para gerenciamento de perfis e permissões de acesso ao sistema, centralizando a governança de segurança da informação.",
    tags: ["Governança", "Segurança"]
  },
  {
    id: "DI-588", bucket: "ref", priority: "urgente",
    title: "Avaliação de Crédito Serasa em Todos os Formulários de Segurados",
    desc: "Expandir a funcionalidade de consulta de crédito Serasa para todos os formulários de cadastro de segurados, padronizando a análise de risco em toda a operação.",
    tags: ["Segurado", "Risco"]
  },
  {
    id: "DI-253", bucket: "ref", priority: "media",
    title: "Integração com Base de Pessoas Expostas Politicamente (PEP-CGU)",
    desc: "Automatizar a consulta e atualização dos dados de PEP junto à CGU, garantindo conformidade com as exigências regulatórias de prevenção à lavagem de dinheiro.",
    tags: ["Regulatório", "Compliance"]
  },
  {
    id: "DI-591", bucket: "ref", priority: "importante",
    title: "Cadastro de Tomador Externo via Portal do Corretor",
    desc: "Permitir que corretores realizem o cadastro de tomadores diretamente pelo portal, dando mais autonomia à rede de distribuição e acelerando o processo comercial.",
    tags: ["Comercial", "Portal do Corretor"]
  },
  {
    id: "DI-636", bucket: "ref", priority: "importante",
    title: "Gestão de Carteira de Executivos Comerciais",
    desc: "Criar painel de gestão para acompanhamento e distribuição de carteiras entre os executivos comerciais (produtores), melhorando a visibilidade e o controle da operação.",
    tags: ["Comercial", "Gestão"]
  },
  {
    id: "DI-473", bucket: "ref", priority: "media",
    title: "Provisionamento Automático de Acesso para Corretores",
    desc: "Automatizar a criação de perfil de acesso (PC-GESTOR) no momento da ativação do corretor no Reborn, eliminando etapas manuais e acelerando o onboarding.",
    tags: ["Portal do Corretor", "Automação"]
  },
];

// State
const directions = {};

const BUCKETS = [
  { key: "exec", label: "Em Execução (Desenvolvimento)", color: "#00C9B7", countId: "count-exec" },
  { key: "prio", label: "Priorizado", color: "#0A1F3F", countId: "count-prio" },
  { key: "back", label: "Backlog", color: "#2D6A4F", countId: "count-back" },
  { key: "ref",  label: "Refinamento Negócio/Técnico", color: "#9CA3AF", countId: "count-ref" },
];

const DIRECTIONS = ["Manter", "Priorizar", "Adiar", "Cancelar", "Reavaliar"];

function renderBoard() {
  const board = document.getElementById("board");
  const summaryHTML = board.querySelector('.summary-panel').outerHTML;
  board.innerHTML = summaryHTML;

  BUCKETS.forEach(b => {
    const cards = CARDS_DATA.filter(c => c.bucket === b.key);
    if (cards.length === 0) return;

    const section = document.createElement("div");
    section.className = "bucket-section";
    section.dataset.bucket = `bucket-${b.key}`;

    section.innerHTML = `
      <div class="bucket-header">
        <div class="bucket-indicator" style="background:${b.color}"></div>
        <span class="bucket-title">${b.label}</span>
        <span class="bucket-count" style="background:${b.color}">${cards.length}</span>
      </div>
      <div class="cards-grid">
        ${cards.map(c => renderCard(c, b.color)).join('')}
      </div>
    `;

    board.appendChild(section);
  });

  applyFilters();
}

function renderCard(c) {
  const prioClass = c.priority;
  const prioLabel = c.priority === 'media' ? 'Média' : c.priority.charAt(0).toUpperCase() + c.priority.slice(1);
  const currentDir = directions[c.id] || null;

  return `
    <div class="card priority-${prioClass}" data-id="${c.id}" data-priority="${c.priority}" data-bucket="${c.bucket}">
      <div class="card-top">
        <span class="card-id">${c.id}</span>
        <span class="priority-badge ${prioClass}">${prioLabel}</span>
      </div>
      <div class="card-title">${c.title}</div>
      <div class="card-desc">${c.desc}</div>
      <div class="card-tags">
        ${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <div class="direction-area">
        <span class="direction-label">Direcionamento:</span>
        ${DIRECTIONS.map(d => {
          const dk = d.toLowerCase();
          const sel = currentDir === dk ? `selected dir-${dk}` : '';
          return `<button class="direction-btn ${sel}" data-dir="${dk}" data-card="${c.id}" onclick="setDirection('${c.id}','${dk}',this)">${d}</button>`;
        }).join('')}
      </div>
    </div>
  `;
}

function setDirection(cardId, dir, btn) {
  if (directions[cardId] === dir) {
    delete directions[cardId];
  } else {
    directions[cardId] = dir;
  }
  // Update buttons in this card
  const card = btn.closest('.card');
  card.querySelectorAll('.direction-btn').forEach(b => {
    const bDir = b.dataset.dir;
    b.className = 'direction-btn' + (directions[cardId] === bDir ? ` selected dir-${bDir}` : '');
  });
  updateSummary();
}

function updateSummary() {
  const counts = { manter: 0, priorizar: 0, adiar: 0, cancelar: 0, reavaliar: 0 };
  Object.values(directions).forEach(d => { if (counts[d] !== undefined) counts[d]++; });
  const pending = CARDS_DATA.length - Object.keys(directions).length;

  document.getElementById('sum-manter').textContent = counts.manter;
  document.getElementById('sum-priorizar').textContent = counts.priorizar;
  document.getElementById('sum-adiar').textContent = counts.adiar;
  document.getElementById('sum-cancelar').textContent = counts.cancelar;
  document.getElementById('sum-reavaliar').textContent = counts.reavaliar;
  document.getElementById('sum-pending').textContent = pending;
}

// Filters
let activeBucket = 'all';
let activePrio = null;

function toggleFilter(chip) {
  document.querySelectorAll('.filter-chip[data-filter]').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeBucket = chip.dataset.filter;
  applyFilters();
}

function togglePrio(chip) {
  if (chip.classList.contains('active')) {
    chip.classList.remove('active');
    activePrio = null;
  } else {
    document.querySelectorAll('.filter-chip[data-prio]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activePrio = chip.dataset.prio;
  }
  applyFilters();
}

function applyFilters() {
  document.querySelectorAll('.bucket-section').forEach(section => {
    const bk = section.dataset.bucket;
    const showBucket = activeBucket === 'all' || bk === activeBucket;
    section.classList.toggle('hidden', !showBucket);

    if (showBucket) {
      section.querySelectorAll('.card').forEach(card => {
        const showPrio = !activePrio || card.dataset.priority === activePrio;
        card.style.display = showPrio ? '' : 'none';
      });
    }
  });
}

function resetAll() {
  Object.keys(directions).forEach(k => delete directions[k]);
  activeBucket = 'all';
  activePrio = null;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.filter-chip[data-filter="all"]').classList.add('active');
  renderBoard();
  updateSummary();
}

function exportSummary() {
  let text = "BACKLOG REBORN — RESUMO DE DIRECIONAMENTO\n";
  text += "=" .repeat(50) + "\n\n";

  DIRECTIONS.forEach(d => {
    const dk = d.toLowerCase();
    const items = CARDS_DATA.filter(c => directions[c.id] === dk);
    if (items.length === 0) return;
    text += `▸ ${d.toUpperCase()} (${items.length})\n`;
    items.forEach(c => {
      text += `  [${c.id}] ${c.title}\n`;
    });
    text += "\n";
  });

  const pending = CARDS_DATA.filter(c => !directions[c.id]);
  if (pending.length > 0) {
    text += `▸ SEM DIRECIONAMENTO (${pending.length})\n`;
    pending.forEach(c => {
      text += `  [${c.id}] ${c.title}\n`;
    });
  }

  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "backlog_reborn_direcionamento.txt";
  a.click();
  URL.revokeObjectURL(url);
}

// Init
renderBoard();
updateSummary();
</script>
