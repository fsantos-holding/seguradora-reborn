<style>
*{margin:0;padding:0;box-sizing:border-box}

.col-dot{width:9px;height:9px;border-radius:50%}.col-title{font-family:var(--font-d);font-weight:700;font-size:.74rem;color:var(--g800);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.col.collapsed .col-head{flex-direction:column;padding:.5rem .25rem;gap:.5rem;border-bottom:none}.col.collapsed .col-title{writing-mode:vertical-lr;text-orientation:mixed;transform:rotate(180deg);font-size:.7rem;overflow:visible}.col.collapsed .col-cards{display:none}.col.collapsed .col-toggle{transform:rotate(180deg)}.col.collapsed .col-count{margin:0}

.card-top{display:flex;align-items:center;justify-content:space-between;gap:.4rem;margin-bottom:.3rem}.card-id{font-size:.58rem;font-weight:700;color:var(--g400);font-family:'SF Mono','Fira Code',monospace}.card-top-right{display:flex;align-items:center;gap:.25rem}
.card-delete{width:18px;height:18px;border-radius:50%;border:none;background:transparent;color:var(--g300);cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:0}.card:hover .card-delete{opacity:1}.card-delete:hover{background:var(--red-bg);color:var(--red)}
.prio{font-size:.54rem;font-weight:700;padding:.1rem .35rem;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}.prio-urgente{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}.prio-importante{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}.prio-media{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b)}
.card-title{font-family:var(--font-d);font-weight:700;font-size:.72rem;color:var(--g800);line-height:1.35;margin-bottom:.25rem}.card-desc{font-size:.65rem;color:var(--g500);line-height:1.5;margin-bottom:.35rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.dir-area{border-top:1px solid var(--g100);padding-top:.45rem;margin-top:.1rem;display:flex;align-items:center;gap:.2rem;flex-wrap:wrap}.dir-label{font-size:.56rem;font-weight:600;color:var(--g400);text-transform:uppercase;width:100%;margin-bottom:.12rem}
.dir-btn{font-size:.56rem;font-weight:600;padding:.18rem .4rem;border-radius:4px;border:1.5px solid var(--g200);background:var(--white);color:var(--g500);cursor:pointer;transition:all .18s}.dir-btn:hover{border-color:var(--teal);color:var(--teal-d);background:#F0FDFB}
.dir-btn.sel{color:var(--white)}.dir-btn.sel.d-manter{background:#059669;border-color:#059669}.dir-btn.sel.d-priorizar{background:var(--teal-d);border-color:var(--teal-d)}.dir-btn.sel.d-adiar{background:var(--amber);border-color:var(--amber);color:var(--g800)}.dir-btn.sel.d-cancelar{background:var(--red);border-color:var(--red)}.dir-btn.sel.d-reavaliar{background:var(--g600);border-color:var(--g600)}
.drop-placeholder{border:2px dashed var(--teal);border-radius:var(--rad-sm);background:rgba(0,201,183,.04);min-height:40px}
.summary-bar{position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:2px solid var(--teal);padding:.5rem 1.5rem;z-index:200;transform:translateY(100%);transition:transform .3s}.summary-bar.visible{transform:translateY(0)}.summary-in{max-width:1900px;margin:0 auto;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}.sum-item{display:flex;align-items:center;gap:.3rem}.sum-dot{width:7px;height:7px;border-radius:50%}.sum-count{font-family:var(--font-d);font-weight:800;font-size:.9rem;color:var(--white)}.sum-label{font-size:.66rem;color:var(--g400);font-weight:500}.sum-sep{width:1px;height:18px;background:var(--g600)}
.modal-overlay{position:fixed;inset:0;background:rgba(10,31,63,.5);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:var(--rad);width:95%;max-width:560px;max-height:90vh;overflow-y:auto;padding:1.5rem;box-shadow:var(--shadow-drag);position:relative}
.modal-close{position:absolute;top:.7rem;right:.7rem;width:26px;height:26px;border-radius:50%;border:none;background:var(--g100);color:var(--g500);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;z-index:5}.modal-close:hover{background:var(--g200);color:var(--g800)}
.form-title{font-family:var(--font-d);font-weight:800;font-size:1rem;color:var(--g800);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}.form-title-badge{font-size:.65rem;font-weight:600;padding:.15rem .5rem;border-radius:10px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b)}
.form-row{margin-bottom:.8rem}.form-label{display:block;font-size:.68rem;font-weight:600;color:var(--g600);margin-bottom:.2rem;text-transform:uppercase;letter-spacing:.04em}
.form-input,.form-select,.form-textarea{width:100%;padding:.4rem .6rem;border:1.5px solid var(--g200);border-radius:var(--rad-sm);font-family:var(--font-b);font-size:.78rem;color:var(--g700);background:var(--g50);outline:none;transition:border .2s}.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--teal)}.form-textarea{min-height:65px;resize:vertical}

.form-tags-wrap{display:flex;flex-wrap:wrap;gap:.25rem}.form-tag{padding:.22rem .5rem;border-radius:14px;font-size:.64rem;font-weight:600;border:1.5px solid var(--g200);background:var(--white);color:var(--g600);cursor:pointer;transition:all .18s;user-select:none}.form-tag.sel{background:var(--teal);color:var(--navy);border-color:var(--teal)}

.col-cards::-webkit-scrollbar{width:4px}.col-cards::-webkit-scrollbar-track{background:transparent}.col-cards::-webkit-scrollbar-thumb{background:var(--g300);border-radius:4px}

<body>
<div class="hdr"><div class="hdr-in">
  <div class="brand"><div class="brand-bar"></div><h1>AUSTRAL <span>SEGURADORA</span> — Backlog Reborn</h1></div>
  <div class="hdr-right">
    <div class="save-indicator" id="save-ind"><div class="dot"></div><span class="stxt">Salvo</span></div>
    <button class="btn btn-add" onclick="openNewCardForm()">+ Novo Card</button>
    <label class="btn btn-ghost" style="cursor:pointer">⬆ CSV<input type="file" accept=".csv" style="display:none" onchange="importCSV(event)"></label>
    <button class="btn btn-primary" onclick="exportCSV()">⬇ CSV</button>
  </div>
</div></div>
<div class="stats"><div class="stats-in" id="stats-bar"></div></div>
<div class="filters"><div class="filters-in">
  <span class="f-label">Prioridade:</span>
  <span class="chip on" data-prio="all" onclick="setPrio(this)">Todas</span>
  <span class="chip" data-prio="Urgente" onclick="setPrio(this)">Urgente</span>
  <span class="chip" data-prio="Importante" onclick="setPrio(this)">Importante</span>
  <span class="chip" data-prio="Média" onclick="setPrio(this)">Média</span>
  <span class="f-sep"></span>
  <span class="label-toggle" id="label-toggle" onclick="toggleLabelDrawer()"><span class="f-label" style="margin:0;color:inherit">Rótulos</span><span class="arrow">▼</span></span>
  <div class="search-box"><input type="text" id="search-input" placeholder="Buscar..." oninput="applyFilters()"></div>
</div><div style="max-width:1900px;margin:0 auto;padding:0 1.5rem"><div class="label-drawer" id="label-drawer"></div></div></div>
<div class="board" id="board"></div>
<div class="summary-bar" id="summary-bar"><div class="summary-in" id="summary-in"></div></div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)"><div class="modal" id="modal-content"></div></div>
<div class="confirm-overlay" id="confirm-overlay"></div>
<div class="confirm-toast" id="confirm-toast"><p id="confirm-msg"></p><div class="cb"><button class="btn btn-cancel" onclick="hideConfirm()">Cancelar</button><button class="btn" style="background:var(--red);color:var(--white)" onclick="confirmDeleteAction()">Excluir</button></div></div>

<script>

let DB=null,_saveQ=null,_apiOk=false;
function persist(){DB.lastUpdated=new Date().toISOString();try{localStorage.setItem(DB_KEY,JSON.stringify(DB))}catch(e){}clearTimeout(_saveQ);_saveQ=setTimeout(syncAPI,300);flashSave()}
async function syncAPI(){try{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(DB)});if(r.ok){_apiOk=true;console.log('Saved to API')}else{console.error('API fail:',r.status);flashError()}}catch(e){}}
function flashSave(){const el=document.getElementById("save-ind");el.querySelector('.dot').style.background='var(--teal)';el.querySelector('.stxt').textContent='Salvo';el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),1500)}
function flashError(){const el=document.getElementById("save-ind");el.querySelector('.dot').style.background='var(--red)';el.querySelector('.stxt').textContent='Erro API';el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),3000)}
async function initDB(){try{const r=await fetch(API_URL,{cache:'no-store'});if(r.ok){const d=await r.json();if(d&&d.cards&&d.cards.length>0){DB=d;_apiOk=true;try{localStorage.setItem(DB_KEY,JSON.stringify(DB))}catch(e){}ensureFields();fullRender();return}}}catch(e){}try{const raw=localStorage.getItem(DB_KEY);if(raw){DB=JSON.parse(raw);ensureFields();fullRender();return}}catch(e){}DB=JSON.parse(JSON.stringify(DEFAULT_DB));fullRender()}
function ensureFields(){DB.cards.forEach((c,i)=>{if(c.order==null)c.order=i;if(c.dueDate===undefined)c.dueDate=null;if(c.direction===undefined)c.direction=null})}
function gc(){return DB.cards}
function gb(){return DB.config.bucketOrder}
function gcol(){return new Set(DB.config.collapsedColumns||[])}
function gcb(bk){return gc().filter(c=>c.bucket===bk).sort((a,b)=>(a.order||0)-(b.order||0))}
let activePrio="all",activeLabels=new Set(),searchQuery="",labelsOpen=false,pendingDeleteId=null,ncCounter=100;

function fullRender(){renderLabelFilters();renderStats();renderBoard()}
function renderLabelFilters(){document.getElementById("label-drawer").innerHTML=FILTER_LABELS.map(l=>`<span class="chip${activeLabels.has(l)?' on-teal':''}" data-label="${l}" onclick="toggleLabel(this)">${l}</span>`).join('')}
function toggleLabelDrawer(){labelsOpen=!labelsOpen;document.getElementById("label-drawer").classList.toggle("open",labelsOpen);document.getElementById("label-toggle").classList.toggle("open",labelsOpen)}
function renderStats(){const el=document.getElementById("stats-bar");let h='';gb().forEach((b,i)=>{const n=gc().filter(c=>c.bucket===b.key).length;if(i>0)h+='<div class="stat-div"></div>';h+=`<div class="stat"><div class="stat-dot" style="background:${b.color}"></div><span class="sl">${b.label}</span><span class="sc">${n}</span></div>`});h+='<div class="stat-div"></div>';h+=`<div class="stat"><span class="sl" style="font-weight:700;color:var(--g700)">Total</span><span class="sc" style="color:var(--teal-d)">${gc().length}</span></div>`;el.innerHTML=h}
function daysRemaining(d){if(!d)return null;return Math.ceil((new Date(d+"T00:00:00")-new Date().setHours(0,0,0,0))/86400000)}
function dueHtml(c){const dr=daysRemaining(c.dueDate);if(dr===null)return'';const cls=dr<0?'overdue':dr<=3?'soon':'';const txt=dr<0?`${Math.abs(dr)}d atraso`:dr===0?'Hoje':`${dr}d`;return`<span class="card-due ${cls}"><span class="due-icon">◷</span>${txt}</span>`}

function renderBoard(){
  const board=document.getElementById("board");board.innerHTML='';const cols=gcol();
  gb().forEach((b,idx)=>{
    const allCards=gcb(b.key),vis=allCards.filter(cv),isC=cols.has(b.key);
    const col=document.createElement("div");col.className="col"+(isC?" collapsed":"");col.dataset.bucket=b.key;col.dataset.idx=String(idx);
    // Column header is the drag handle
    if(isC)col.addEventListener("click",(e)=>{if(!e.target.closest('.col-cards')&&!e.target.closest('.dir-btn')&&!e.target.closest('.card-delete'))toggleCC(b.key)});
    col.innerHTML=`<div class="col-head" draggable="true" data-colkey="${b.key}"><div class="col-dot" style="background:${b.color}"></div><div class="col-title" ondblclick="editCT(this,'${b.key}')">${b.label}</div><div class="col-count" style="background:${b.color}">${vis.length}</div><div class="col-toggle" title="${isC?'Expandir':'Recolher'}" onclick="event.stopPropagation();toggleCC('${b.key}')">◂</div></div><div class="col-cards" data-bucket="${b.key}"></div>`;
    // Column drag events on the header
    const head=col.querySelector('.col-head');
    head.addEventListener("dragstart",colDS);
    head.addEventListener("dragend",colDE);
    // Column as drop target (for column reorder)
    col.addEventListener("dragover",colOverCol);
    col.addEventListener("dragleave",colLeaveCol);
    col.addEventListener("drop",colDropOnCol);
    if(!isC){const ce=col.querySelector(".col-cards");ce.addEventListener("dragover",cDO);ce.addEventListener("dragleave",cDL);ce.addEventListener("drop",cDR);vis.forEach(c=>ce.appendChild(mkC(c)))}
    board.appendChild(col);
  });
  updateSummary();
}

function editCT(el,key){const b=gb().find(x=>x.key===key);if(!b)return;const inp=document.createElement("input");inp.className="col-title-input";inp.value=b.label;inp.draggable=false;el.replaceWith(inp);inp.focus();inp.select();function sv(){b.label=inp.value.trim()||b.label;persist();fullRender()}inp.addEventListener("blur",sv);inp.addEventListener("keydown",(e)=>{if(e.key==="Enter")sv();if(e.key==="Escape"){inp.value=b.label;sv()}})}
function toggleCC(key){const s=gcol();if(s.has(key))s.delete(key);else s.add(key);DB.config.collapsedColumns=[...s];persist();renderBoard()}
function cv(c){if(activePrio!=="all"&&c.priority!==activePrio)return false;if(activeLabels.size>0&&!c.tags.some(t=>activeLabels.has(t)))return false;if(searchQuery){const q=searchQuery.toLowerCase();if(!c.title.toLowerCase().includes(q)&&!c.id.toLowerCase().includes(q)&&!c.desc.toLowerCase().includes(q)&&!c.tags.some(t=>t.toLowerCase().includes(q)))return false}return true}

function mkC(c){
  const d=document.createElement("div");d.className="card";d.draggable=true;d.dataset.id=c.id;d.dataset.type="card";
  d.addEventListener("dragstart",cDS);d.addEventListener("dragend",cDE);
  d.addEventListener("click",(e)=>{if(!e.target.classList.contains("dir-btn")&&!e.target.classList.contains("card-delete"))openEdit(c.id)});
  const pc=c.priority==="Urgente"?"prio-urgente":c.priority==="Importante"?"prio-importante":"prio-media";
  const pgc=c.progress==="Em andamento"?"var(--teal)":c.progress==="Concluída"?"var(--green)":"var(--g400)";
  const dir=c.direction||null;
  d.innerHTML=`<div class="card-top"><span class="card-id">${c.id}</span><div class="card-top-right"><button class="card-delete" title="Excluir" onclick="event.stopPropagation();askDel('${c.id}')">✕</button><span class="prio ${pc}">${c.priority}</span></div></div><div class="card-title">${c.title}</div><div class="card-desc">${c.desc}</div><div class="card-tags">${c.tags.map(t=>`<span class="tag${t==='Incidente'?' tag-incident':''}">${t}</span>`).join('')}</div><div class="card-footer"><div class="card-progress"><div class="prog-dot" style="background:${pgc}"></div><span class="prog-label">${c.progress}</span></div>${dueHtml(c)}</div><div class="dir-area"><span class="dir-label">Direcionamento</span>${DIRECTIONS.map(x=>{const dk=x.toLowerCase();const s=dir===dk?`sel d-${dk}`:'';return`<button class="dir-btn ${s}" data-dir="${dk}" data-card="${c.id}" onclick="event.stopPropagation();setDir('${c.id}','${dk}',this)">${x}</button>`}).join('')}</div>`;
  return d;
}

// ════════════════════════════
// CARD DRAG & DROP
// ════════════════════════════
let dragCid=null;
function cDS(e){e.stopPropagation();dragCid=e.currentTarget.dataset.id;e.currentTarget.classList.add("dragging");e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/card",dragCid);
  // Store previous bucket
  const card=gc().find(c=>c.id===dragCid);if(card)card._prevBucket=card.bucket;
}
function cDE(e){e.currentTarget.classList.remove("dragging");document.querySelectorAll(".col-cards").forEach(el=>el.classList.remove("drag-over"));document.querySelectorAll(".drop-placeholder").forEach(el=>el.remove());dragCid=null}
function cDO(e){if(!dragCid)return;e.preventDefault();e.stopPropagation();const col=e.currentTarget;col.classList.add("drag-over");let ph=col.querySelector(".drop-placeholder");if(!ph){ph=document.createElement("div");ph.className="drop-placeholder"}const af=gDA(col,e.clientY);if(af)col.insertBefore(ph,af);else col.appendChild(ph)}
function cDL(e){if(!e.currentTarget.contains(e.relatedTarget)){e.currentTarget.classList.remove("drag-over");e.currentTarget.querySelectorAll(".drop-placeholder").forEach(el=>el.remove())}}
function cDR(e){
  if(!dragCid)return;e.preventDefault();e.stopPropagation();
  const colEl=e.currentTarget;colEl.classList.remove("drag-over");
  const ph=colEl.querySelector(".drop-placeholder");
  const newBucket=colEl.dataset.bucket;
  const card=gc().find(c=>c.id===dragCid);
  if(!card){if(ph)ph.remove();return}
  let newIdx=0;
  if(ph){let count=0;for(const ch of colEl.children){if(ch===ph)break;if(ch.classList&&ch.classList.contains("card")&&!ch.classList.contains("dragging"))count++}newIdx=count;ph.remove()}
  else{newIdx=[...colEl.querySelectorAll(".card:not(.dragging)")].length}
  card.bucket=newBucket;
  const bucketCards=gcb(newBucket).filter(c=>c.id!==card.id);
  bucketCards.splice(newIdx,0,card);
  bucketCards.forEach((c,i)=>c.order=i);
  persist();renderBoard();renderStats();
}
function gDA(ct,y){const els=[...ct.querySelectorAll(".card:not(.dragging)")];let cl=null,co=Number.NEGATIVE_INFINITY;els.forEach(ch=>{const b=ch.getBoundingClientRect();const o=y-b.top-b.height/2;if(o<0&&o>co){co=o;cl=ch}});return cl}

// ════════════════════════════
// COLUMN DRAG & DROP
// Drag starts from col-head, drop detected on col elements
// ════════════════════════════
let dragColK=null;
function colDS(e){
  if(dragCid)return; // card drag in progress, ignore
  if(e.target.closest('.col-toggle')||e.target.closest('.col-title-input')){e.preventDefault();return}
  const colKey=e.currentTarget.dataset.colkey;
  if(!colKey)return;
  dragColK=colKey;
  // Find parent col and style it
  const colEl=e.currentTarget.closest('.col');
  if(colEl)colEl.classList.add("col-dragging");
  e.dataTransfer.effectAllowed="move";
  e.dataTransfer.setData("text/col",colKey);
}
function colDE(e){
  document.querySelectorAll(".col").forEach(c=>{c.classList.remove("col-dragging","col-drop-left","col-drop-right")});
  dragColK=null;
}
function colOverCol(e){
  if(!dragColK||dragCid)return;
  e.preventDefault();
  const col=e.currentTarget;
  if(col.dataset.bucket===dragColK)return;
  // Determine left or right half
  const rect=col.getBoundingClientRect();
  const isLeft=e.clientX<rect.left+rect.width/2;
  // Clear all indicators
  document.querySelectorAll(".col").forEach(c=>{c.classList.remove("col-drop-left","col-drop-right")});
  col.classList.add(isLeft?"col-drop-left":"col-drop-right");
}
function colLeaveCol(e){
  if(!dragColK)return;
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove("col-drop-left","col-drop-right");
  }
}
function colDropOnCol(e){
  if(!dragColK||dragCid)return;
  e.preventDefault();e.stopPropagation();
  const targetCol=e.currentTarget;
  const targetKey=targetCol.dataset.bucket;
  if(targetKey===dragColK){document.querySelectorAll(".col").forEach(c=>c.classList.remove("col-drop-left","col-drop-right"));dragColK=null;return}
  const bo=gb();
  const fromIdx=bo.findIndex(b=>b.key===dragColK);
  const toIdx=bo.findIndex(b=>b.key===targetKey);
  if(fromIdx===-1||toIdx===-1){dragColK=null;return}
  const rect=targetCol.getBoundingClientRect();
  const dropOnLeft=e.clientX<rect.left+rect.width/2;
  // Remove dragged column
  const[moved]=bo.splice(fromIdx,1);
  // Recalculate target index after removal
  let newToIdx=bo.findIndex(b=>b.key===targetKey);
  if(newToIdx===-1)newToIdx=bo.length;
  // Insert before or after target
  const insertAt=dropOnLeft?newToIdx:newToIdx+1;
  bo.splice(insertAt,0,moved);
  dragColK=null;
  document.querySelectorAll(".col").forEach(c=>c.classList.remove("col-dragging","col-drop-left","col-drop-right"));
  persist();
  renderBoard();
  renderStats();
}

function setDir(cid,dir,btn){const c=gc().find(x=>x.id===cid);if(!c)return;c.direction=c.direction===dir?null:dir;persist();const card=btn.closest(".card");card.querySelectorAll(".dir-btn").forEach(b=>{const d=b.dataset.dir;b.className="dir-btn"+(c.direction===d?` sel d-${d}`:"")});updateSummary()}
function updateSummary(){const cards=gc();const counts={};DIRECTIONS.forEach(d=>counts[d.toLowerCase()]=0);cards.forEach(c=>{if(c.direction)counts[c.direction]++});const tot=cards.filter(c=>c.direction).length;const bar=document.getElementById("summary-bar"),inn=document.getElementById("summary-in");bar.classList.toggle("visible",tot>0);let h='';DIRECTIONS.forEach((d,i)=>{const dk=d.toLowerCase();if(i>0)h+='<div class="sum-sep"></div>';h+=`<div class="sum-item"><div class="sum-dot" style="background:${DIR_COLORS[dk]}"></div><span class="sum-count">${counts[dk]}</span><span class="sum-label">${d}</span></div>`});h+='<div class="sum-sep"></div>';h+=`<div class="sum-item"><span class="sum-count" style="color:var(--g400)">${cards.length-tot}</span><span class="sum-label">Pendentes</span></div>`;inn.innerHTML=h}

let eTags=new Set();
function openEdit(cid){
  const c=gc().find(x=>x.id===cid);if(!c)return;eTags=new Set(c.tags);
  document.getElementById("modal-content").innerHTML=`<button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('show')">&times;</button>
    <div class="form-title">Editar <span class="form-title-badge">${c.id}</span></div>
    <div class="form-row"><label class="form-label">ID</label><input class="form-input" id="e-id" value="${c.id}"></div>
    <div class="form-row"><label class="form-label">Título</label><input class="form-input" id="e-title" value="${esc(c.title)}"></div>
    <div class="form-row"><label class="form-label">Descrição</label><textarea class="form-textarea" id="e-desc">${esc(c.desc)}</textarea></div>
    <div class="form-row-inline"><div class="form-row"><label class="form-label">Coluna</label><select class="form-select" id="e-bucket">${gb().map(b=>`<option value="${b.key}"${b.key===c.bucket?' selected':''}>${b.label}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Prioridade</label><select class="form-select" id="e-prio">${PRIORITIES.map(p=>`<option value="${p}"${p===c.priority?' selected':''}>${p}</option>`).join('')}</select></div></div>
    <div class="form-row-inline"><div class="form-row"><label class="form-label">Progresso</label><select class="form-select" id="e-prog">${PROGRESSES.map(p=>`<option value="${p}"${p===c.progress?' selected':''}>${p}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Data de Conclusão</label><input class="form-input" type="date" id="e-due" value="${c.dueDate||''}"></div></div>
    <div class="form-row"><label class="form-label">Rótulos</label><div class="form-tags-wrap">${FILTER_LABELS.map(t=>`<span class="form-tag${eTags.has(t)?' sel':''}" data-tag="${t}" onclick="tE(this)">${t}</span>`).join('')}</div></div>
    <div class="form-actions"><button class="btn btn-del-modal" onclick="askDel('${c.id}')">Excluir</button><button class="btn btn-cancel" onclick="document.getElementById('modal-overlay').classList.remove('show')">Cancelar</button><button class="btn btn-save" onclick="svEdit('${c.id}')">Salvar</button></div>`;
  document.getElementById("modal-overlay").classList.add("show");
}
function tE(el){const t=el.dataset.tag;if(eTags.has(t)){eTags.delete(t);el.classList.remove("sel")}else{eTags.add(t);el.classList.add("sel")}}
function svEdit(oid){const c=gc().find(x=>x.id===oid);if(!c)return;const title=document.getElementById("e-title").value.trim();if(!title){alert("Informe o título.");return}c.id=document.getElementById("e-id").value.trim()||oid;c.title=title;c.desc=document.getElementById("e-desc").value.trim()||"Sem descrição.";c.bucket=document.getElementById("e-bucket").value;c.priority=document.getElementById("e-prio").value;c.progress=document.getElementById("e-prog").value;c.dueDate=document.getElementById("e-due").value||null;c.tags=[...eTags];persist();document.getElementById("modal-overlay").classList.remove("show");fullRender()}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── New Card ──
let nTags=new Set();
function openNewCardForm(){
  nTags=new Set();
  document.getElementById("modal-content").innerHTML=`<button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('show')">&times;</button>
    <div class="form-title">Novo Card</div>
    <div class="form-row"><label class="form-label">ID</label><input class="form-input" id="f-id" placeholder="Ex: DI-700"></div>
    <div class="form-row"><label class="form-label">Título</label><input class="form-input" id="f-title" placeholder="Título executivo"></div>
    <div class="form-row"><label class="form-label">Descrição</label><textarea class="form-textarea" id="f-desc" placeholder="Descrição"></textarea></div>
    <div class="form-row-inline"><div class="form-row"><label class="form-label">Coluna</label><select class="form-select" id="f-bucket">${gb().map(b=>`<option value="${b.key}">${b.label}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Prioridade</label><select class="form-select" id="f-prio">${PRIORITIES.map(p=>`<option value="${p}">${p}</option>`).join('')}</select></div></div>
    <div class="form-row-inline"><div class="form-row"><label class="form-label">Progresso</label><select class="form-select" id="f-prog">${PROGRESSES.map(p=>`<option value="${p}">${p}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Data de Conclusão</label><input class="form-input" type="date" id="f-due"></div></div>
    <div class="form-row"><label class="form-label">Rótulos</label><div class="form-tags-wrap">${FILTER_LABELS.map(t=>`<span class="form-tag" data-tag="${t}" onclick="tN(this)">${t}</span>`).join('')}</div></div>
    <div class="form-actions"><button class="btn btn-cancel" onclick="document.getElementById('modal-overlay').classList.remove('show')">Cancelar</button><button class="btn btn-save" onclick="svNew()">Salvar</button></div>`;
  document.getElementById("modal-overlay").classList.add("show");
}
function tN(el){const t=el.dataset.tag;if(nTags.has(t)){nTags.delete(t);el.classList.remove("sel")}else{nTags.add(t);el.classList.add("sel")}}
function svNew(){const id=document.getElementById("f-id").value.trim()||`NEW-${ncCounter++}`;const title=document.getElementById("f-title").value.trim();if(!title){alert("Informe o título.");return}const bk=document.getElementById("f-bucket").value;const maxOrd=gcb(bk).reduce((m,c)=>Math.max(m,c.order||0),0);DB.cards.push({id,bucket:bk,priority:document.getElementById("f-prio").value,progress:document.getElementById("f-prog").value,title,desc:document.getElementById("f-desc").value.trim()||"Sem descrição.",tags:[...nTags],direction:null,dueDate:document.getElementById("f-due").value||null,order:maxOrd+1});persist();document.getElementById("modal-overlay").classList.remove("show");fullRender()}

// ── Export CSV ──
function exportCSV(){const sep=";",nl="\r\n",hdr=["ID","Coluna","Prioridade","Progresso","Título","Descrição","Rótulos","Direcionamento","Data de Conclusão"];let csv=hdr.join(sep)+nl;gc().forEach(c=>{csv+=[c.id,c.bucket,c.priority,c.progress,'"'+c.title.replace(/"/g,'""')+'"','"'+(c.desc||'').replace(/"/g,'""')+'"','"'+c.tags.join(", ")+'"',c.direction||'',c.dueDate||''].join(sep)+nl});const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));a.download="backlog_reborn_export.csv";a.click()}

// ── Import CSV ──
function importCSV(evt){const file=evt.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2){alert("CSV vazio.");return}const hdr=pCSV(lines[0]);const idx={};hdr.forEach((h,i)=>{idx[h.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")]=i});const iT=idx["titulo"]??idx["título"]??-1;if(iT===-1){alert("Coluna 'Título' não encontrada.");return}const nc=[];for(let i=1;i<lines.length;i++){const c=pCSV(lines[i]);if(c.length<2)continue;const g=k=>c[k]!==undefined?c[k].trim():'';const tags=g(idx["rotulos"]??idx["rótulos"]??-1)?g(idx["rotulos"]??idx["rótulos"]??-1).split(/[;,]/).map(t=>t.trim()).filter(Boolean):[];nc.push({id:g(idx["id"]??-1)||`IMP-${i}`,bucket:g(idx["coluna"]??-1)||'Backlog',priority:g(idx["prioridade"]??-1)||'Média',progress:g(idx["progresso"]??-1)||'Não iniciado',title:g(iT),desc:g(idx["descricao"]??idx["descrição"]??-1)||'',tags,direction:g(idx["direcionamento"]??-1)||null,dueDate:g(idx["data de conclusao"]??idx["data de conclusão"]??idx["duedate"]??-1)||null,order:i-1})}if(!nc.length){alert("Nenhum card.");return}if(confirm(`Importar ${nc.length} cards? Substitui os atuais.`)){DB.cards=nc;const ek=new Set(gb().map(b=>b.key));const clrs=["#9CA3AF","#8B5CF6","#0A1F3F","#00C9B7","#F97316","#10B981","#EF4444","#3B82F6"];nc.forEach(c=>{if(!ek.has(c.bucket)){gb().push({key:c.bucket,label:c.bucket,color:clrs[gb().length%clrs.length]});ek.add(c.bucket)}});persist();fullRender()}evt.target.value=''};reader.readAsText(file,'UTF-8')}
function pCSV(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(q){if(ch==='"'){if(i+1<line.length&&line[i+1]==='"'){c+='"';i++}else q=false}else c+=ch}else{if(ch==='"')q=true;else if(ch===';'||ch===','){r.push(c);c=''}else c+=ch}}r.push(c);return r}

initDB();
</script>
