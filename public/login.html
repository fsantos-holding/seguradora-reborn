<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Plataforma</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--teal:#00C9B7;--teal-d:#009E90;--navy:#0A1F3F;--lime:#C5D93E;--white:#FFF;--off:#F4F6FA;--g100:#F3F4F6;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#4B5563;--g700:#374151;--font-d:'Plus Jakarta Sans',sans-serif;--font-b:'DM Sans',sans-serif;--rad:12px;--shadow:0 8px 32px rgba(10,31,63,.12)}
body{font-family:var(--font-b);background:linear-gradient(135deg,var(--navy) 0%,#0d2d5c 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;color:var(--g700)}
.card{background:var(--white);border-radius:var(--rad);box-shadow:var(--shadow);width:100%;max-width:400px;padding:2rem}
.brand{display:flex;align-items:center;gap:.6rem;margin-bottom:1.5rem}
.brand-bar{width:4px;height:28px;background:var(--teal);border-radius:2px}
.brand h1{font-family:var(--font-d);font-size:1.1rem;font-weight:800;color:var(--navy)}
.brand h1 span{color:var(--teal)}
.tabs{display:flex;gap:.25rem;margin-bottom:1.5rem;background:var(--g100);border-radius:8px;padding:4px}
.tab{flex:1;padding:.5rem;border:none;background:transparent;font-family:var(--font-b);font-weight:600;font-size:.8rem;color:var(--g600);cursor:pointer;border-radius:6px;transition:all .2s}
.tab:hover{color:var(--navy)}
.tab.active{background:var(--white);color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.form-row{margin-bottom:1rem}
.form-label{display:block;font-size:.7rem;font-weight:600;color:var(--g600);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;padding:.6rem .75rem;border:1.5px solid var(--g200);border-radius:8px;font-family:var(--font-b);font-size:.9rem;color:var(--g700);background:var(--white);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--teal)}
.form-input::placeholder{color:var(--g400)}
.remember{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.remember input{width:18px;height:18px;accent-color:var(--teal);cursor:pointer}
.remember label{font-size:.85rem;color:var(--g600);cursor:pointer}
.btn{padding:.65rem 1.25rem;border-radius:8px;font-family:var(--font-b);font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;border:none;width:100%}
.btn-primary{background:var(--teal);color:var(--navy)}
.btn-primary:hover{background:var(--lime)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.err{background:#FEF2F2;color:#B91C1C;padding:.5rem .75rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;display:none}
.err.show{display:block}
.panel{display:none}
.panel.active{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><div class="brand-bar"></div><h1>AUSTRAL <span>SEGURADORA</span></h1></div>
  <div class="tabs">
    <button class="tab active" data-panel="login">Entrar</button>
    <button class="tab" data-panel="register">Cadastrar</button>
  </div>
  <div id="err" class="err"></div>

  <div id="panel-login" class="panel active">
    <form id="form-login" onsubmit="return doLogin(event)">
      <div class="form-row"><label class="form-label">Usuário ou E-mail</label><input class="form-input" id="login-user" type="text" placeholder="Usuário ou e-mail" autocomplete="username"></div>
      <div class="form-row"><label class="form-label">Senha</label><input class="form-input" id="login-pwd" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="remember"><input type="checkbox" id="login-remember" checked><label for="login-remember">Manter conectado (gravar no navegador)</label></div>
      <button type="submit" class="btn btn-primary" id="btn-login">Entrar</button>
    </form>
  </div>

  <div id="panel-register" class="panel">
    <form id="form-register" onsubmit="return doRegister(event)">
      <div class="form-row"><label class="form-label">Nome</label><input class="form-input" id="reg-name" type="text" placeholder="Seu nome completo" autocomplete="name"></div>
      <div class="form-row"><label class="form-label">E-mail</label><input class="form-input" id="reg-email" type="email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="form-row"><label class="form-label">Senha</label><input class="form-input" id="reg-pwd" type="password" placeholder="Mínimo 4 caracteres" autocomplete="new-password"></div>
      <div class="remember"><input type="checkbox" id="reg-remember" checked><label for="reg-remember">Manter conectado após cadastro</label></div>
      <button type="submit" class="btn btn-primary" id="btn-register">Cadastrar</button>
    </form>
  </div>
</div>

<script>
const AUTH_KEY = "reborn_auth";
const API = { login: "/api/auth/login", register: "/api/auth/register" };

function showErr(msg) {
  const el = document.getElementById("err");
  el.textContent = msg || "";
  el.classList.toggle("show", !!msg);
}

function setAuth(token, user, remember) {
  const data = { token, user };
  if (remember) localStorage.setItem(AUTH_KEY, JSON.stringify(data));
  else sessionStorage.setItem(AUTH_KEY, JSON.stringify(data));
}

async function doLogin(e) {
  e.preventDefault();
  showErr("");
  const user = document.getElementById("login-user").value.trim();
  const pwd = document.getElementById("login-pwd").value;
  const remember = document.getElementById("login-remember").checked;
  if (!user || !pwd) { showErr("Preencha usuário e senha."); return false; }
  const btn = document.getElementById("btn-login");
  btn.disabled = true;
  try {
    const r = await fetch(API.login, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pwd }),
    });
    const data = await r.json();
    if (!r.ok) { showErr(data.error || "Erro ao entrar."); return false; }
    setAuth(data.token, data.user, remember);
    window.location.href = "boards.html";
  } catch (err) {
    showErr("Erro de conexão. Tente novamente.");
  } finally {
    btn.disabled = false;
  }
  return false;
}

async function doRegister(e) {
  e.preventDefault();
  showErr("");
  const name = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const pwd = document.getElementById("reg-pwd").value;
  const remember = document.getElementById("reg-remember").checked;
  if (!name || !email || !pwd) { showErr("Preencha todos os campos."); return false; }
  if (pwd.length < 4) { showErr("Senha deve ter pelo menos 4 caracteres."); return false; }
  const btn = document.getElementById("btn-register");
  btn.disabled = true;
  try {
    const r = await fetch(API.register, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password: pwd }),
    });
    const data = await r.json();
    if (!r.ok) { showErr(data.error || "Erro ao cadastrar."); return false; }
    setAuth(data.token, data.user, remember);
    window.location.href = "boards.html";
  } catch (err) {
    showErr("Erro de conexão. Tente novamente.");
  } finally {
    btn.disabled = false;
  }
  return false;
}

document.querySelectorAll(".tab").forEach((t) => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach((x) => x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("panel-" + t.dataset.panel).classList.add("active");
    showErr("");
  });
});

const stored = localStorage.getItem(AUTH_KEY) || sessionStorage.getItem(AUTH_KEY);
if (stored) {
  try {
    const { token } = JSON.parse(stored);
    fetch("/api/auth/me", { headers: { Authorization: "Bearer " + token } })
      .then((r) => r.json())
      .then((d) => { if (d.user) window.location.href = "boards.html"; })
      .catch(() => {});
  } catch (e) {}
}
</script>
</body>
</html>
