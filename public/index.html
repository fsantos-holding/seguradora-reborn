<title>Plataforma Reborn</title>
<script>
(function(){
  var auth=localStorage.getItem("reborn_auth")||sessionStorage.getItem("reborn_auth");
  if(auth){try{var d=JSON.parse(auth);if(d&&d.token){window.location.replace("boards.html");return}}catch(e){}}
  window.location.replace("login.html");
})();
</script>
