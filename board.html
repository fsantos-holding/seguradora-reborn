.color-pop .cp-s{width:22px;height:22px;border-radius:8px;border:1px solid rgba(17,24,39,.08);cursor:pointer;transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease}
.color-pop .cp-s:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(10,31,63,.12)}
.color-pop .cp-s.sel{border-color:rgba(10,31,63,.45);box-shadow:inset 0 0 0 2px rgba(255,255,255,.9),0 10px 22px rgba(10,31,63,.12)}
.color-pop .cp-row{display:flex;align-items:center;gap:.5rem}
.color-pop input[type="color"]{width:36px;height:28px;border-radius:10px;border:1.5px solid var(--g200);background:transparent;padding:0;cursor:pointer}
.color-pop .cp-hex{flex:1;border:1.5px solid var(--g200);background:rgba(249,250,251,.8);border-radius:10px;padding:.35rem .55rem;font-family:'SF Mono','Fira Code',monospace;font-size:.7rem;color:var(--g700);outline:none}
.color-pop .cp-hex:focus{border-color:var(--teal)}
.back-link{color:var(--g400);font-size:.8rem;text-decoration:none;margin-right:.5rem}.back-link:hover{color:var(--white)}
@media(max-width:900px){.board{flex-direction:column;align-items:stretch}.col,.col.collapsed{min-width:100%;max-width:100%;max-height:none;flex:1 0 auto}.col.collapsed .col-head{flex-direction:row}.col.collapsed .col-title{writing-mode:horizontal-tb;transform:none}.col.collapsed .col-cards{display:none}.hdr-in,.stats-in,.filters-in,.board{padding-left:1rem;padding-right:1rem}}
@media(max-width:640px){.mapa-modal .mapa-card{grid-template-columns:28px 1fr 1fr!important}.mapa-modal .mapa-card .mapa-card-cell:nth-child(4),.mapa-modal .mapa-card .mapa-card-cell:nth-child(5){grid-column:2/-1}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div class="brand"><a href="boards.html" class="back-link">← Boards</a><div class="brand-bar"></div><h1>AUSTRAL <span>SEGURADORA</span> — <span id="board-title">Board</span></h1></div>
  <div class="hdr-right">
    <div class="save-indicator" id="save-ind"><div class="dot"></div><span class="stxt">Salvo</span></div>
    <button class="btn btn-add" onclick="openNewCardForm()">+ Novo Card</button>
    <label class="btn btn-ghost" style="cursor:pointer">⬆ CSV<input type="file" accept=".csv" style="display:none" onchange="importCSV(event)"></label>
    <button class="btn btn-primary" onclick="exportCSV()">⬇ CSV</button>
  </div>
</div></div>
<div class="stats"><div class="stats-in" id="stats-bar"></div></div>
<div class="filters"><div class="filters-in">
  <span class="f-label">Prioridade:</span>
  <span class="chip on" data-prio="all" onclick="setPrio(this)">Todas</span>
  <span class="chip" data-prio="Urgente" onclick="setPrio(this)">Urgente</span>
  <span class="chip" data-prio="Importante" onclick="setPrio(this)">Importante</span>
  <span class="chip" data-prio="Média" onclick="setPrio(this)">Média</span>
  <span class="f-sep"></span>
  <span class="label-toggle" id="label-toggle" onclick="toggleLabelDrawer()"><span class="f-label" style="margin:0;color:inherit">Rótulos</span><span class="arrow">▼</span></span>
  <span class="f-sep"></span>
  <span class="mapa-prod-toggle" onclick="openMapaProducao()"><span class="f-label" style="margin:0;color:inherit">Mapa de Produção</span></span>
  <div class="search-box"><input type="text" id="search-input" placeholder="Buscar..." oninput="applyFilters()"></div>
</div><div style="max-width:1900px;margin:0 auto;padding:0 1.5rem"><div class="label-drawer" id="label-drawer"></div></div></div>
<div class="board" id="board"></div>
<div class="summary-bar" id="summary-bar"><div class="summary-in" id="summary-in"></div></div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)"><div class="modal" id="modal-content"></div></div>
<div class="confirm-overlay" id="confirm-overlay"></div>
<div class="confirm-toast" id="confirm-toast"><p id="confirm-msg"></p><div class="cb"><button class="btn btn-cancel" onclick="hideConfirm()">Cancelar</button><button class="btn" style="background:var(--red);color:var(--white)" onclick="confirmDeleteAction()">Excluir</button></div></div>
<div class="color-pop" id="bucket-color-pop"></div>

<script>
const AUTH_KEY="reborn_auth";
const BOARD_ID=new URLSearchParams(location.search).get("id");
const FILTER_LABELS=["Comercial","Corretor","Financial Lines (D&O)","Incidente","Negócio","Portal do Corretor","RCG","Reborn","Ressegurador","Segurado","Subscrição","Tomador"];
const PRIORITIES=["Urgente","Importante","Média"],PROGRESSES=["Não iniciado","Em andamento","Concluída"];
const DIRECTIONS=["Manter","Priorizar","Adiar","Cancelar","Reavaliar"];
const DIR_COLORS={manter:"#059669",priorizar:"#009E90",adiar:"#F59E0B",cancelar:"#EF4444",reavaliar:"#6B7280"};
const DEFAULT_DB={"version":"2.0","lastUpdated":"","cards":[],"config":{"bucketOrder":[{"key":"Refinamento Negócio/Técnico","label":"Refinamento","color":"#9CA3AF"},{"key":"Backlog","label":"Backlog","color":"#8B5CF6"},{"key":"Priorizado","label":"Priorizado","color":"#0A1F3F"},{"key":"Em Execução (Desenvolvimento)","label":"Em Execução","color":"#00C9B7"},{"key":"Incidente","label":"Incidente","color":"#F97316"},{"key":"Em Produção","label":"Em Produção","color":"#10B981"}],"collapsedColumns":[]}};
const DEFAULT_MAPA_PRODUCAO=[{papel:"Corretor",equipe:"Comercial",linha:"Todas as Linhas",operacoes:"SERPRO (RF), SUSEP"},{papel:"Cliente / Pagador",equipe:"D&O",linha:"Financial Lines",operacoes:"SERPRO (RF), SERASA"},{papel:"Cliente",equipe:"E&O, RCG, Petróleo",linha:"Garantia — RC Profissional, RC Geral, Energy, Subscrição",operacoes:"SERPRO (RF)"},{papel:"Tomador",equipe:"Comercial",linha:"Garantia",operacoes:"SERPRO (RF), SERASA"}];
let DB=null,_saveQ=null,_apiOk=false,BOARD_NAME="Board";

function getAuth(){const raw=localStorage.getItem(AUTH_KEY)||sessionStorage.getItem(AUTH_KEY);if(!raw)return null;try{return JSON.parse(raw)}catch{return null}}
function getAPIUrl(){return"/api/boards/"+BOARD_ID}
function getHeaders(){const a=getAuth();return{"Content-Type":"application/json",Authorization:"Bearer "+(a?a.token:"")}}

function persist(){if(!DB)return;DB.lastUpdated=new Date().toISOString();clearTimeout(_saveQ);_saveQ=setTimeout(syncAPI,300);flashSave()}
function getMapaProducao(){if(!DB.mapaProducao||!Array.isArray(DB.mapaProducao)){DB.mapaProducao=JSON.parse(JSON.stringify(DEFAULT_MAPA_PRODUCAO))}return DB.mapaProducao}
function saveMapaProducao(arr){DB.mapaProducao=arr;persist()}
async function syncAPI(){if(!getAuth()||!BOARD_ID)return;try{const payload={cards:DB.cards,config:DB.config,mapaProducao:DB.mapaProducao,version:DB.version,lastUpdated:DB.lastUpdated};const r=await fetch(getAPIUrl(),{method:"PUT",headers:getHeaders(),body:JSON.stringify(payload)});if(r.ok){_apiOk=true}else{flashError()}}catch(e){flashError()}}
function flashSave(){const el=document.getElementById("save-ind");el.querySelector('.dot').style.background='var(--teal)';el.querySelector('.stxt').textContent='Salvo';el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),1500)}
function flashError(){const el=document.getElementById("save-ind");el.querySelector('.dot').style.background='var(--red)';el.querySelector('.stxt').textContent='Erro API';el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),3000)}
async function initDB(){if(!getAuth()){window.location.href="login.html";return}if(!BOARD_ID){window.location.href="boards.html";return}try{const r=await fetch(getAPIUrl(),{cache:"no-store",headers:getHeaders()});if(r.status===401){localStorage.removeItem(AUTH_KEY);sessionStorage.removeItem(AUTH_KEY);window.location.href="login.html";return}if(r.status===403){alert("Sem permissão para este board.");window.location.href="boards.html";return}if(r.ok){const d=await r.json();BOARD_NAME=d.name||"Board";document.getElementById("board-title").textContent=BOARD_NAME;DB={version:d.version||"2.0",lastUpdated:d.lastUpdated||"",cards:d.cards||[],config:d.config||DEFAULT_DB.config,mapaProducao:d.mapaProducao};ensureFields();fullRender();return}}catch(e){}alert("Erro ao carregar board.");window.location.href="boards.html"}
function ensureFields(){if(!DB.cards)DB.cards=[];DB.cards.forEach((c,i)=>{if(c.order==null)c.order=i;if(c.dueDate===undefined)c.dueDate=null;if(c.direction===undefined)c.direction=null;if(!Array.isArray(c.tags))c.tags=[]});ensureBucketColors();getMapaProducao()}
function gc(){return DB.cards}
function gb(){return DB.config.bucketOrder}
function gcol(){return new Set(DB.config.collapsedColumns||[])}
function gcb(bk){return gc().filter(c=>c.bucket===bk).sort((a,b)=>(a.order||0)-(b.order||0))}
let activePrio="all",activeLabels=new Set(),searchQuery="",labelsOpen=false,pendingDeleteId=null,ncCounter=100;

const BUCKET_SWATCHES=["#0A1F3F","#00C9B7","#009E90","#10B981","#3B82F6","#8B5CF6","#EF4444","#F97316","#F59E0B","#C5D93E","#6B7280","#111827","#9CA3AF","#14B8A6","#22C55E","#A855F7"];
let _bucketColorOpenFor=null;
function normHex(c){if(!c)return null;let s=String(c).trim();if(!s)return null;if(s[0]!=='#')s='#'+s;if(/^#[0-9a-fA-F]{3}$/.test(s))s='#'+s[1]+s[1]+s[2]+s[2]+s[3]+s[3];if(!/^#[0-9a-fA-F]{6}$/.test(s))return null;return s.toUpperCase()}
function ensureBucketColors(){if(!DB||!DB.config||!Array.isArray(DB.config.bucketOrder))return;DB.config.bucketOrder.forEach((b,i)=>{const c=normHex(b.color)||BUCKET_SWATCHES[i%BUCKET_SWATCHES.length];b.color=c})}
document.addEventListener("click",(e)=>{const pop=document.getElementById("bucket-color-pop");if(!pop.classList.contains("show"))return;const t=e.target;if(t.closest("#bucket-color-pop"))return;if(t.closest(".col-colorbtn"))return;closeBucketColorPicker()})
document.addEventListener("keydown",(e)=>{if(e.key==="Escape")closeBucketColorPicker()})
function openBucketColorPicker(bucketKey,btn){const b=gb().find(x=>x.key===bucketKey);if(!b)return;const pop=document.getElementById("bucket-color-pop");if(_bucketColorOpenFor===bucketKey&&pop.classList.contains("show")){closeBucketColorPicker();return}_bucketColorOpenFor=bucketKey;const cur=normHex(b.color)||"#00C9B7";pop.innerHTML=`<div class="cp-h"><div class="cp-t">Cor da Coluna</div><button class="cp-x" onclick="closeBucketColorPicker()">✕</button></div><div class="cp-sw">${BUCKET_SWATCHES.map(c=>`<div class="cp-s${c.toUpperCase()===cur?' sel':''}" style="background:${c}" onclick="setBucketColor('${bucketKey}','${c}')"></div>`).join('')}</div><div class="cp-row"><input type="color" value="${cur}" oninput="setBucketColor('${bucketKey}',this.value,true)"><input class="cp-hex" value="${cur}" maxlength="7" spellcheck="false" oninput="setBucketColorFromText('${bucketKey}',this.value)"></div>`;const r=btn.getBoundingClientRect();pop.style.left=Math.min(window.innerWidth-270,Math.max(12,r.left-10))+"px";pop.style.top=Math.min(window.innerHeight-220,Math.max(60,r.bottom+8))+"px";pop.classList.add("show")}
function closeBucketColorPicker(){_bucketColorOpenFor=null;document.getElementById("bucket-color-pop").classList.remove("show")}
function setBucketColor(bucketKey,color,keepOpen){const b=gb().find(x=>x.key===bucketKey);if(!b)return;const c=normHex(color);if(!c)return;b.color=c;persist();renderBoard();renderStats();if(keepOpen){const pop=document.getElementById("bucket-color-pop");if(pop.classList.contains("show")){const hex=pop.querySelector(".cp-hex");if(hex)hex.value=c}}}
function setBucketColorFromText(bucketKey,text){const c=normHex(text);if(!c)return;setBucketColor(bucketKey,c,true)}

function fullRender(){renderLabelFilters();renderStats();renderBoard()}
function renderLabelFilters(){document.getElementById("label-drawer").innerHTML=FILTER_LABELS.map(l=>`<span class="chip${activeLabels.has(l)?' on-teal':''}" data-label="${l}" onclick="toggleLabel(this)">${l}</span>`).join('')}
function toggleLabelDrawer(){labelsOpen=!labelsOpen;document.getElementById("label-drawer").classList.toggle("open",labelsOpen);document.getElementById("label-toggle").classList.toggle("open",labelsOpen)}
function renderStats(){const el=document.getElementById("stats-bar");let h='';gb().forEach((b,i)=>{const n=gc().filter(c=>c.bucket===b.key).length;const col=normHex(b.color)||'#9CA3AF';if(i>0)h+='<div class="stat-div"></div>';h+=`<div class="stat"><div class="stat-dot" style="background:${col}"></div><span class="sl">${esc(b.label||'')}</span><span class="sc">${n}</span></div>`});h+='<div class="stat-div"></div>';h+=`<div class="stat"><span class="sl" style="font-weight:700;color:var(--g700)">Total</span><span class="sc" style="color:var(--teal-d)">${gc().length}</span></div>`;el.innerHTML=h}
function daysRemaining(d){if(!d)return null;return Math.ceil((new Date(d+"T00:00:00")-new Date().setHours(0,0,0,0))/86400000)}
function dueHtml(c){const dr=daysRemaining(c.dueDate);if(dr===null)return'';const cls=dr<0?'overdue':dr<=3?'soon':'';const txt=dr<0?`${Math.abs(dr)}d atraso`:dr===0?'Hoje':`${dr}d`;return`<span class="card-due ${cls}"><span class="due-icon">◷</span>${txt}</span>`}

function renderBoard(){const board=document.getElementById("board");board.innerHTML='';const cols=gcol();gb().forEach((b,idx)=>{const allCards=gcb(b.key),vis=allCards.filter(cv),isC=cols.has(b.key);const col=document.createElement("div");col.className="col"+(isC?" collapsed":"");col.dataset.bucket=b.key;col.dataset.idx=String(idx);if(isC)col.addEventListener("click",(e)=>{if(!e.target.closest('.col-cards')&&!e.target.closest('.dir-btn')&&!e.target.closest('.card-delete'))toggleCC(b.key)});col.innerHTML=`<div class="col-head" draggable="true" data-colkey="${b.key}"><div class="col-dot" style="background:${b.color}"></div><button class="col-colorbtn" title="Alterar cor" onclick="event.stopPropagation();openBucketColorPicker('${b.key}',this)">◍</button><div class="col-title" ondblclick="editCT(this,'${b.key}')">${b.label}</div><div class="col-count" style="background:${b.color}">${vis.length}</div><div class="col-toggle" title="${isC?'Expandir':'Recolher'}" onclick="event.stopPropagation();toggleCC('${b.key}')">◂</div></div><div class="col-cards" data-bucket="${b.key}"></div>`;const head=col.querySelector('.col-head');head.addEventListener("dragstart",colDS);head.addEventListener("dragend",colDE);col.addEventListener("dragover",colOverCol);col.addEventListener("dragleave",colLeaveCol);col.addEventListener("drop",colDropOnCol);if(!isC){const ce=col.querySelector(".col-cards");ce.addEventListener("dragover",cDO);ce.addEventListener("dragleave",cDL);ce.addEventListener("drop",cDR);vis.forEach(c=>ce.appendChild(mkC(c)))}board.appendChild(col)});updateSummary()}

function editCT(el,key){const b=gb().find(x=>x.key===key);if(!b)return;const inp=document.createElement("input");inp.className="col-title-input";inp.value=b.label;inp.draggable=false;el.replaceWith(inp);inp.focus();inp.select();function sv(){b.label=inp.value.trim()||b.label;persist();fullRender()}inp.addEventListener("blur",sv);inp.addEventListener("keydown",(e)=>{if(e.key==="Enter")sv();if(e.key==="Escape"){inp.value=b.label;sv()}})}
function toggleCC(key){const s=gcol();if(s.has(key))s.delete(key);else s.add(key);DB.config.collapsedColumns=[...s];persist();renderBoard()}
function cv(c){if(activePrio!=="all"&&c.priority!==activePrio)return false;if(activeLabels.size>0&&!c.tags.some(t=>activeLabels.has(t)))return false;if(searchQuery){const q=searchQuery.toLowerCase();if(!c.title.toLowerCase().includes(q)&&!c.id.toLowerCase().includes(q)&&!c.desc.toLowerCase().includes(q)&&!c.tags.some(t=>t.toLowerCase().includes(q)))return false}return true}

function mkC(c){const d=document.createElement("div");d.className="card";d.draggable=true;d.dataset.id=c.id;d.dataset.type="card";d.addEventListener("dragstart",cDS);d.addEventListener("dragend",cDE);d.addEventListener("click",(e)=>{if(!e.target.classList.contains("dir-btn")&&!e.target.classList.contains("card-delete"))openEdit(c.id)});const pc=c.priority==="Urgente"?"prio-urgente":c.priority==="Importante"?"prio-importante":"prio-media";const pgc=c.progress==="Em andamento"?"var(--teal)":c.progress==="Concluída"?"var(--green)":"var(--g400)";const dir=c.direction||null;d.innerHTML=`<div class="card-top"><span class="card-id">${c.id}</span><div class="card-top-right"><button class="card-delete" title="Excluir" onclick="event.stopPropagation();askDel('${c.id}')">✕</button><span class="prio ${pc}">${c.priority}</span></div></div><div class="card-title">${c.title}</div><div class="card-desc">${c.desc}</div><div class="card-tags">${c.tags.map(t=>`<span class="tag${t==='Incidente'?' tag-incident':''}">${t}</span>`).join('')}</div><div class="card-footer"><div class="card-progress"><div class="prog-dot" style="background:${pgc}"></div><span class="prog-label">${c.progress}</span></div>${dueHtml(c)}</div><div class="dir-area"><span class="dir-label">Direcionamento</span>${DIRECTIONS.map(x=>{const dk=x.toLowerCase();const s=dir===dk?`sel d-${dk}`:'';return`<button class="dir-btn ${s}" data-dir="${dk}" data-card="${c.id}" onclick="event.stopPropagation();setDir('${c.id}','${dk}',this)">${x}</button>`}).join('')}</div>`;return d}

let dragCid=null;
function cDS(e){e.stopPropagation();dragCid=e.currentTarget.dataset.id;e.currentTarget.classList.add("dragging");e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/card",dragCid);const card=gc().find(c=>c.id===dragCid);if(card)card._prevBucket=card.bucket}
function cDE(e){e.currentTarget.classList.remove("dragging");document.querySelectorAll(".col-cards").forEach(el=>el.classList.remove("drag-over"));document.querySelectorAll(".drop-placeholder").forEach(el=>el.remove());dragCid=null}
function cDO(e){if(!dragCid)return;e.preventDefault();e.stopPropagation();const col=e.currentTarget;col.classList.add("drag-over");let ph=col.querySelector(".drop-placeholder");if(!ph){ph=document.createElement("div");ph.className="drop-placeholder"}const af=gDA(col,e.clientY);if(af)col.insertBefore(ph,af);else col.appendChild(ph)}
function cDL(e){if(!e.currentTarget.contains(e.relatedTarget)){e.currentTarget.classList.remove("drag-over");e.currentTarget.querySelectorAll(".drop-placeholder").forEach(el=>el.remove())}}
function cDR(e){if(!dragCid)return;e.preventDefault();e.stopPropagation();const colEl=e.currentTarget;colEl.classList.remove("drag-over");const ph=colEl.querySelector(".drop-placeholder");const newBucket=colEl.dataset.bucket;const card=gc().find(c=>c.id===dragCid);if(!card){if(ph)ph.remove();return}let newIdx=0;if(ph){let count=0;for(const ch of colEl.children){if(ch===ph)break;if(ch.classList&&ch.classList.contains("card")&&!ch.classList.contains("dragging"))count++}newIdx=count;ph.remove()}else{newIdx=[...colEl.querySelectorAll(".card:not(.dragging)")].length}card.bucket=newBucket;const bucketCards=gcb(newBucket).filter(c=>c.id!==card.id);bucketCards.splice(newIdx,0,card);bucketCards.forEach((c,i)=>c.order=i);persist();renderBoard();renderStats()}
function gDA(ct,y){const els=[...ct.querySelectorAll(".card:not(.dragging)")];let cl=null,co=Number.NEGATIVE_INFINITY;els.forEach(ch=>{const b=ch.getBoundingClientRect();const o=y-b.top-b.height/2;if(o<0&&o>co){co=o;cl=ch}});return cl}

let dragColK=null;
function colDS(e){if(dragCid)return;if(e.target.closest('.col-toggle')||e.target.closest('.col-title-input')){e.preventDefault();return}const colKey=e.currentTarget.dataset.colkey;if(!colKey)return;dragColK=colKey;const colEl=e.currentTarget.closest('.col');if(colEl)colEl.classList.add("col-dragging");e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/col",colKey)}
function colDE(e){document.querySelectorAll(".col").forEach(c=>{c.classList.remove("col-dragging","col-drop-left","col-drop-right")});dragColK=null}
function colOverCol(e){if(!dragColK||dragCid)return;e.preventDefault();const col=e.currentTarget;if(col.dataset.bucket===dragColK)return;const rect=col.getBoundingClientRect();const isLeft=e.clientX<rect.left+rect.width/2;document.querySelectorAll(".col").forEach(c=>{c.classList.remove("col-drop-left","col-drop-right")});col.classList.add(isLeft?"col-drop-left":"col-drop-right")}
function colLeaveCol(e){if(!dragColK)return;if(!e.currentTarget.contains(e.relatedTarget)){e.currentTarget.classList.remove("col-drop-left","col-drop-right")}}
function colDropOnCol(e){if(!dragColK||dragCid)return;e.preventDefault();e.stopPropagation();const targetCol=e.currentTarget;const targetKey=targetCol.dataset.bucket;if(targetKey===dragColK){document.querySelectorAll(".col").forEach(c=>{c.classList.remove("col-drop-left","col-drop-right")});dragColK=null;return}const bo=gb();const fromIdx=bo.findIndex(b=>b.key===dragColK);const toIdx=bo.findIndex(b=>b.key===targetKey);if(fromIdx===-1||toIdx===-1){dragColK=null;return}const rect=targetCol.getBoundingClientRect();const dropOnLeft=e.clientX<rect.left+rect.width/2;const[moved]=bo.splice(fromIdx,1);let newToIdx=bo.findIndex(b=>b.key===targetKey);if(newToIdx===-1)newToIdx=bo.length;const insertAt=dropOnLeft?newToIdx:newToIdx+1;bo.splice(insertAt,0,moved);dragColK=null;document.querySelectorAll(".col").forEach(c=>{c.classList.remove("col-dragging","col-drop-left","col-drop-right")});persist();renderBoard();renderStats()}

function setDir(cid,dir,btn){const c=gc().find(x=>x.id===cid);if(!c)return;c.direction=c.direction===dir?null:dir;persist();const card=btn.closest(".card");card.querySelectorAll(".dir-btn").forEach(b=>{const d=b.dataset.dir;b.className="dir-btn"+(c.direction===d?` sel d-${d}`:"")});updateSummary()}
function updateSummary(){const cards=gc();const counts={};DIRECTIONS.forEach(d=>counts[d.toLowerCase()]=0);cards.forEach(c=>{if(c.direction)counts[c.direction]++});const tot=cards.filter(c=>c.direction).length;const bar=document.getElementById("summary-bar"),inn=document.getElementById("summary-in");bar.classList.toggle("visible",tot>0);let h='';DIRECTIONS.forEach((d,i)=>{const dk=d.toLowerCase();if(i>0)h+='<div class="sum-sep"></div>';h+=`<div class="sum-item"><div class="sum-dot" style="background:${DIR_COLORS[dk]}"></div><span class="sum-count">${counts[dk]}</span><span class="sum-label">${d}</span></div>`});h+='<div class="sum-sep"></div>';h+=`<div class="sum-item"><span class="sum-count" style="color:var(--g400)">${cards.length-tot}</span><span class="sum-label">Pendentes</span></div>`;inn.innerHTML=h}

function setPrio(chip){document.querySelectorAll("[data-prio]").forEach(c=>c.classList.remove("on"));chip.classList.add("on");activePrio=chip.dataset.prio;renderBoard()}
function toggleLabel(chip){const l=chip.dataset.label;if(activeLabels.has(l))activeLabels.delete(l);else activeLabels.add(l);chip.classList.toggle("on-teal");renderBoard()}
function applyFilters(){searchQuery=document.getElementById("search-input").value;renderBoard()}
function closeModal(e){if(e.target===e.currentTarget){e.currentTarget.classList.remove("show");const m=document.getElementById("modal-content");if(m)m.classList.remove("modal-wide","mapa-modal")}}
function openMapaProducao(){const mapaData=getMapaProducao();const mc=document.getElementById("modal-content");mc.className="modal modal-wide mapa-modal";mc.innerHTML=`<button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('show');document.getElementById('modal-content').classList.remove('modal-wide','mapa-modal')">&times;</button><div class="mapa-title"><span style="background:var(--teal);color:var(--navy);padding:.2rem .5rem;border-radius:6px;font-size:.7rem">VISÃO EXECUTIVA</span> Mapa de Produção — Plataforma Reborn</div><p class="mapa-intro">Visão consolidada do status operacional da plataforma para apoiar decisões estratégicas.</p><div class="mapa-section"><div class="mapa-section-title">Cadastros em Produção</div><div class="mapa-grid"><div class="mapa-card mapa-card-header-row" style="grid-template-columns:28px 1fr 1fr 1.2fr 1.2fr"><div class="mapa-card-header"></div><div class="mapa-card-header">Papel</div><div class="mapa-card-header">Equipe</div><div class="mapa-card-header">Linha</div><div class="mapa-card-header">Operações</div></div>${mapaData.map((d,i)=>`<div class="mapa-card mapa-card-row" style="grid-template-columns:28px 1fr 1fr 1.2fr 1.2fr" data-mapa-idx="${i}"><div class="mapa-card-cell mapa-prod-icon">✓</div><div class="mapa-card-cell editable" contenteditable="true" data-field="papel" data-idx="${i}"><strong>${esc(d.papel)}</strong></div><div class="mapa-card-cell editable" contenteditable="true" data-field="equipe" data-idx="${i}">${esc(d.equipe)}</div><div class="mapa-card-cell editable" contenteditable="true" data-field="linha" data-idx="${i}">${esc(d.linha)}</div><div class="mapa-card-cell editable mapa-operacoes-cell" contenteditable="true" data-field="operacoes" data-idx="${i}">${renderOperacoes(d.operacoes)}</div></div>`).join('')}</div></div><div class="mapa-section"><div class="mapa-section-title">Mapa Visual</div><div class="mapa-flow" id="mapa-flow-visual">${mapaData.map((d,i)=>`<div class="mapa-flow-item" data-flow-idx="${i}" onclick="toggleMapaFlowSel(this)"><span class="mapa-flow-node"><span class="flow-icon">◆</span>${esc(d.papel)}</span><span class="mapa-flow-arrow">→</span><span class="mapa-flow-ops">${renderOperacoes(d.operacoes)}</span></div>`).join('')}</div></div>`;document.getElementById("modal-overlay").classList.add("show");mc.querySelectorAll(".mapa-card-cell.editable").forEach(el=>{el.addEventListener("blur",function(){const idx=parseInt(this.dataset.idx,10);const field=this.dataset.field;let val=this.innerText.trim();if(field==='operacoes')val=normalizeOperacoes(val);if(DB.mapaProducao[idx]){DB.mapaProducao[idx][field]=val;persist();syncMapaFlowFromData();if(field==='operacoes'){this.innerHTML=renderOperacoes(val)}}})})}
function toggleMapaFlowSel(el){document.querySelectorAll(".mapa-modal .mapa-flow-item").forEach(x=>x.classList.remove("sel"));el.classList.add("sel")}
function syncMapaFlowFromData(){const flow=document.getElementById("mapa-flow-visual");if(!flow)return;const mapaData=getMapaProducao();flow.innerHTML=mapaData.map((d,i)=>`<div class="mapa-flow-item" data-flow-idx="${i}" onclick="toggleMapaFlowSel(this)"><span class="mapa-flow-node"><span class="flow-icon">◆</span>${esc(d.papel)}</span><span class="mapa-flow-arrow">→</span><span class="mapa-flow-ops">${renderOperacoes(d.operacoes)}</span></div>`).join('')}

function askDel(id){const c=gc().find(x=>x.id===id);if(!c)return;pendingDeleteId=id;document.getElementById("confirm-msg").textContent=`Excluir "${c.title}"?`;document.getElementById("confirm-toast").style.display="block";document.getElementById("confirm-overlay").classList.add("show")}
function hideConfirm(){pendingDeleteId=null;document.getElementById("confirm-toast").style.display="none";document.getElementById("confirm-overlay").classList.remove("show")}
function confirmDeleteAction(){if(!pendingDeleteId)return;const idx=DB.cards.findIndex(c=>c.id===pendingDeleteId);if(idx>-1)DB.cards.splice(idx,1);persist();hideConfirm();document.getElementById("modal-overlay").classList.remove("show");fullRender()}

let eTags=new Set();
function openEdit(cid){const c=gc().find(x=>x.id===cid);if(!c)return;eTags=new Set(c.tags);document.getElementById("modal-content").innerHTML=`<button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('show')">&times;</button><div class="form-title">Editar <span class="form-title-badge">${c.id}</span></div><div class="form-row"><label class="form-label">ID</label><input class="form-input" id="e-id" value="${c.id}"></div><div class="form-row"><label class="form-label">Título</label><input class="form-input" id="e-title" value="${esc(c.title)}"></div><div class="form-row"><label class="form-label">Descrição</label><textarea class="form-textarea" id="e-desc">${esc(c.desc)}</textarea></div><div class="form-row-inline"><div class="form-row"><label class="form-label">Coluna</label><select class="form-select" id="e-bucket">${gb().map(b=>`<option value="${b.key}"${b.key===c.bucket?' selected':''}>${b.label}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Prioridade</label><select class="form-select" id="e-prio">${PRIORITIES.map(p=>`<option value="${p}"${p===c.priority?' selected':''}>${p}</option>`).join('')}</select></div></div><div class="form-row-inline"><div class="form-row"><label class="form-label">Progresso</label><select class="form-select" id="e-prog">${PROGRESSES.map(p=>`<option value="${p}"${p===c.progress?' selected':''}>${p}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Data de Conclusão</label><input class="form-input" type="date" id="e-due" value="${c.dueDate||''}"></div></div><div class="form-row"><label class="form-label">Rótulos</label><div class="form-tags-wrap">${FILTER_LABELS.map(t=>`<span class="form-tag${eTags.has(t)?' sel':''}" data-tag="${t}" onclick="tE(this)">${t}</span>`).join('')}</div></div><div class="form-actions"><button class="btn btn-del-modal" onclick="askDel('${c.id}')">Excluir</button><button class="btn btn-cancel" onclick="document.getElementById('modal-overlay').classList.remove('show')">Cancelar</button><button class="btn btn-save" onclick="svEdit('${c.id}')">Salvar</button></div>`;document.getElementById("modal-overlay").classList.add("show")}
function tE(el){const t=el.dataset.tag;if(eTags.has(t)){eTags.delete(t);el.classList.remove("sel")}else{eTags.add(t);el.classList.add("sel")}}
function svEdit(oid){const c=gc().find(x=>x.id===oid);if(!c)return;const title=document.getElementById("e-title").value.trim();if(!title){alert("Informe o título.");return}c.id=document.getElementById("e-id").value.trim()||oid;c.title=title;c.desc=document.getElementById("e-desc").value.trim()||"Sem descrição.";c.bucket=document.getElementById("e-bucket").value;c.priority=document.getElementById("e-prio").value;c.progress=document.getElementById("e-prog").value;c.dueDate=document.getElementById("e-due").value||null;c.tags=[...eTags];persist();document.getElementById("modal-overlay").classList.remove("show");fullRender()}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function mapaOpClass(op){const t=(op||'').toUpperCase();if(t.includes('SERPRO')||t.includes('RF'))return'mapa-op-serpro';if(t.includes('SUSEP'))return'mapa-op-susep';if(t.includes('SERASA'))return'mapa-op-serasa';return''}
function renderOperacoes(opStr){const ops=(opStr||'').split(/[,;]/).map(o=>o.trim()).filter(Boolean);if(!ops.length)return esc(opStr||'');const sep='<span class="mapa-op-sep" aria-hidden="true">➞</span>';return ops.map(o=>`<span class="mapa-badge ${mapaOpClass(o)}">${esc(o)}</span>`).join(sep)}
function normalizeOperacoes(val){return (val||'').replace(/\s*[→➜➞›▶]\s*/g,', ').replace(/\s*,\s*/g,', ').replace(/\s+/g,' ').trim()}

let nTags=new Set();
function openNewCardForm(){nTags=new Set();document.getElementById("modal-content").innerHTML=`<button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('show')">&times;</button><div class="form-title">Novo Card</div><div class="form-row"><label class="form-label">ID</label><input class="form-input" id="f-id" placeholder="Ex: DI-700"></div><div class="form-row"><label class="form-label">Título</label><input class="form-input" id="f-title" placeholder="Título executivo"></div><div class="form-row"><label class="form-label">Descrição</label><textarea class="form-textarea" id="f-desc" placeholder="Descrição"></textarea></div><div class="form-row-inline"><div class="form-row"><label class="form-label">Coluna</label><select class="form-select" id="f-bucket">${gb().map(b=>`<option value="${b.key}">${b.label}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Prioridade</label><select class="form-select" id="f-prio">${PRIORITIES.map(p=>`<option value="${p}">${p}</option>`).join('')}</select></div></div><div class="form-row-inline"><div class="form-row"><label class="form-label">Progresso</label><select class="form-select" id="f-prog">${PROGRESSES.map(p=>`<option value="${p}">${p}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Data de Conclusão</label><input class="form-input" type="date" id="f-due"></div></div><div class="form-row"><label class="form-label">Rótulos</label><div class="form-tags-wrap">${FILTER_LABELS.map(t=>`<span class="form-tag" data-tag="${t}" onclick="tN(this)">${t}</span>`).join('')}</div></div><div class="form-actions"><button class="btn btn-cancel" onclick="document.getElementById('modal-overlay').classList.remove('show')">Cancelar</button><button class="btn btn-save" onclick="svNew()">Salvar</button></div>`;document.getElementById("modal-overlay").classList.add("show")}
function tN(el){const t=el.dataset.tag;if(nTags.has(t)){nTags.delete(t);el.classList.remove("sel")}else{nTags.add(t);el.classList.add("sel")}}
function svNew(){const id=document.getElementById("f-id").value.trim()||`NEW-${ncCounter++}`;const title=document.getElementById("f-title").value.trim();if(!title){alert("Informe o título.");return}const bk=document.getElementById("f-bucket").value;const maxOrd=gcb(bk).reduce((m,c)=>Math.max(m,c.order||0),0);DB.cards.push({id,bucket:bk,priority:document.getElementById("f-prio").value,progress:document.getElementById("f-prog").value,title,desc:document.getElementById("f-desc").value.trim()||"Sem descrição.",tags:[...nTags],direction:null,dueDate:document.getElementById("f-due").value||null,order:maxOrd+1});persist();document.getElementById("modal-overlay").classList.remove("show");fullRender()}

function exportCSV(){const sep=";",nl="\r\n",hdr=["ID","Coluna","Prioridade","Progresso","Título","Descrição","Rótulos","Direcionamento","Data de Conclusão"];let csv=hdr.join(sep)+nl;gc().forEach(c=>{csv+=[c.id,c.bucket,c.priority,c.progress,'"'+c.title.replace(/"/g,'""')+'"','"'+(c.desc||'').replace(/"/g,'""')+'"','"'+c.tags.join(", ")+'"',c.direction||'',c.dueDate||''].join(sep)+nl});const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));a.download="backlog_reborn_export.csv";a.click()}

function importCSV(evt){const file=evt.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){let raw=e.target.result;if(raw.charCodeAt(0)===0xFEFF)raw=raw.slice(1);const rows=parseCSVRows(raw);if(rows.length<2){alert("CSV vazio.");evt.target.value='';return}const hdr=pCSV(rows[0]);const idx={};hdr.forEach((h,i)=>{idx[h.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")]=i});const iT=idx["titulo"]??idx["título"]??-1;if(iT===-1){alert("Coluna 'Título' não encontrada.");evt.target.value='';return}const nc=[];const dirKeys=DIRECTIONS.map(d=>d.toLowerCase());for(let i=1;i<rows.length;i++){const c=pCSV(rows[i]);if(c.length<2)continue;const g=k=>c[k]!==undefined?String(c[k]).trim():'';const tagsRaw=g(idx["rotulos"]??idx["rótulos"]??-1);const tags=tagsRaw?tagsRaw.split(/[;,]/).map(t=>t.trim()).filter(Boolean):[];const bucketRaw=g(idx["coluna"]??-1)||'Backlog';const bucket=mapBucketToExisting(bucketRaw);let dirVal=g(idx["direcionamento"]??-1);dirVal=dirVal&&dirKeys.includes(dirVal.toLowerCase())?dirVal.toLowerCase():null;const prioVal=g(idx["prioridade"]??-1)||'Média';const prio=PRIORITIES.find(p=>p.toLowerCase()===(prioVal||'').toLowerCase())||'Média';const progVal=g(idx["progresso"]??-1)||'Não iniciado';const prog=PROGRESSES.find(p=>p.toLowerCase()===(progVal||'').toLowerCase())||'Não iniciado';nc.push({id:g(idx["id"]??-1)||`IMP-${i}`,bucket,priority:prio,progress:prog,title:g(iT),desc:g(idx["descricao"]??idx["descrição"]??-1)||'',tags,direction:dirVal,dueDate:g(idx["data de conclusao"]??idx["data de conclusão"]??idx["duedate"]??-1)||null,order:i-1})}if(!nc.length){alert("Nenhum card.");evt.target.value='';return}if(confirm(`Importar ${nc.length} cards? Substitui os atuais.`)){DB.cards=nc;ensureFields();const ordByBucket={};nc.forEach((card)=>{const bk=card.bucket;ordByBucket[bk]=ordByBucket[bk]||0;card.order=ordByBucket[bk]++});persist();fullRender()}evt.target.value=''};reader.readAsText(file,'UTF-8')}
function parseCSVRows(text){const rows=[];let cur='';let q=false;for(let i=0;i<text.length;i++){const ch=text[i];if(ch==='"'){q=!q;cur+=ch}else if(ch==='\r'){if(q)cur+=ch;else{if(i+1<text.length&&text[i+1]==='\n')i++;rows.push(cur);cur=''}}else if(ch==='\n'){if(q)cur+=ch;else{rows.push(cur);cur=''}}else cur+=ch}if(cur.trim())rows.push(cur);return rows.filter(r=>r.trim().length>0)}
function mapBucketToExisting(val){if(!val)return'Backlog';const buckets=gb();const v=val.trim();const low=s=>(s||'').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");const vl=low(v);const byKey=buckets.find(b=>low(b.key)===vl);if(byKey)return byKey.key;const byLabel=buckets.find(b=>low(b.label)===vl);if(byLabel)return byLabel.key;return'Backlog'}
function pCSV(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(q){if(ch==='"'){if(i+1<line.length&&line[i+1]==='"'){c+='"';i++}else q=false}else c+=ch}else{if(ch==='"')q=true;else if(ch===';'||ch===','){r.push(c);c=''}else c+=ch}}r.push(c);return r}

initDB();
</script>
